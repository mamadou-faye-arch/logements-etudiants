<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KotUGB – Logements étudiants à Saint-Louis</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">🏠</span>
        <span class="logo-text">Kot<strong>UGB</strong></span>
      </div>
      <p class="tagline">Trouvez votre logement près du campus, sans stress.</p>
    </div>
  </header>

  <!-- BARRE DE RECHERCHE + FILTRES -->
  <section class="filtres-section">
    <div class="filtres-inner">

      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input
          type="text"
          id="searchInput"
          placeholder="Rechercher par quartier, type de logement…"
        />
      </div>

      <div class="filtres-grid">

        <div class="filtre-group">
          <label for="filtreType">Type de logement</label>
          <select id="filtreType">
            <option value="">Tous les types</option>
            <option value="Chambre">Chambre</option>
            <option value="Studio">Studio</option>
            <option value="Appartement">Appartement</option>
            <option value="Colocation">Colocation</option>
          </select>
        </div>

        <div class="filtre-group">
          <label for="filtrePrixMax">Prix max (FCFA/mois)</label>
          <select id="filtrePrixMax">
            <option value="">Sans limite</option>
            <option value="30000">30 000</option>
            <option value="50000">50 000</option>
            <option value="80000">80 000</option>
            <option value="120000">120 000</option>
          </select>
        </div>

        <div class="filtre-group">
          <label for="filtreDistance">Distance campus</label>
          <select id="filtreDistance">
            <option value="">Toutes distances</option>
            <option value="5">≤ 5 min à pied</option>
            <option value="10">≤ 10 min à pied</option>
            <option value="20">≤ 20 min à pied</option>
          </select>
        </div>

        <div class="filtre-group">
          <label for="filtreTri">Trier par</label>
          <select id="filtreTri">
            <option value="prix-asc">Prix croissant</option>
            <option value="prix-desc">Prix décroissant</option>
            <option value="distance-asc">Distance croissante</option>
            <option value="nom-asc">Nom A→Z</option>
          </select>
        </div>

      </div>

      <div class="filtres-actions">
        <button id="btnReset" class="btn-reset">✕ Réinitialiser les filtres</button>
        <span id="countLabel" class="count-label">-- offres</span>
      </div>

    </div>
  </section>

  <!-- LISTE DES LOGEMENTS -->
  <main>
    <div id="logementsList" class="logements-grid"></div>
    <div id="emptyState" class="empty-state hidden">
      <span class="empty-icon">🔎</span>
      <p>Aucun logement ne correspond à vos critères.</p>
      <button onclick="resetFiltres()" class="btn-reset-inline">Voir toutes les offres</button>
    </div>
  </main>

  <!-- MODAL DÉTAIL -->
  <div id="modal" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal-box">
      <button class="modal-close" id="modalClose" aria-label="Fermer">✕</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <p>KotUGB &nbsp;·&nbsp; Projet Dev Web I &nbsp;·&nbsp; L3 MIAGE – UGB Saint-Louis &nbsp;·&nbsp; 2026</p>
  </footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
